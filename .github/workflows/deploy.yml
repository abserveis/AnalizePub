name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one in-flight deploy at a time; queue, then drop superseded runs.
concurrency:
  group: deploy-analizepub
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --app analizepub
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
